# Overrides the shared config: the shared `verify` hook wraps the command in a
# bash invocation that breaks on R's verify command (it contains the double
# quotes from the rcmdcheck --as-cran argument). Here the R code is passed as a
# single argv element, so no shell quoting is involved.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5120']
      # Bundled upstream PSL files under inst/extdata/ (the .dat whose sha256 is
      # recorded, and the verbatim MPL-2.0 LICENSE) must stay byte-for-byte
      # identical to upstream, so the whitespace/EOF fixers must not touch them.
      - id: end-of-file-fixer
        exclude: '^inst/extdata/'
      - id: trailing-whitespace
        exclude: '^inst/extdata/'
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending
        exclude: '^inst/extdata/'
      - id: check-case-conflict
  # Air: fast, R-free (Rust binary) formatter for R sources. Runs per commit and
  # auto-fixes; layout is Air's job, while lintr (in the verify gate) owns
  # logic/best-practice lints. https://posit-dev.github.io/air/
  - repo: https://github.com/posit-dev/air-pre-commit
    rev: 0.8.2
    hooks:
      - id: air-format
  - repo: local
    hooks:
      - id: verify
        name: verify (mirrors CI)
        entry: Rscript -e
        args:
          - 'lints <- lintr::lint_package(); if (length(lints)) { print(lints); quit(status = 1) }; rcmdcheck::rcmdcheck(args = "--as-cran", error_on = "warning")'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        verbose: true
