# Fast verification gate: lint + a single Ubuntu R CMD check, on every push to
# main and every PR. This is the quick feedback loop for the common case --
# R-only, docs, or test changes -- so small slices are not blocked on the full
# cross-platform matrix.
#
# Full cross-platform coverage (macOS, Windows, R devel/release/oldrel) lives in
# full-check.yml, which runs on merges to main, on PRs that touch compiled or
# build files, on a weekly schedule, and on demand. Together they keep CRAN-grade
# coverage without paying the 5-platform tax on every commit. The local pre-push
# hook still runs the full `R CMD check --as-cran`, so a developer's own platform
# is always checked before a push.
#
# This intentionally overrides the shared Node/uv verify.yml: an R package is
# verified with r-lib/actions, and the testthat + cucumber specs run inside
# R CMD check itself.
name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      LINTR_ERROR_ON_LINT: true
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}

  check:
    needs: lint
    runs-on: ubuntu-latest
    name: R CMD check (ubuntu-latest, release)
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          # Fast gate runs a standard check; the strict --as-cran pass lives in
          # full-check.yml (and the local pre-push hook).
          args: '"--no-manual"'
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
